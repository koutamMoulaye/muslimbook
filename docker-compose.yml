services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL: ${NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL:-}
    container_name: muslimbook
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./private:/app/private:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.muslimbook.rule=Host(`muslimebookproject-muslimebook-fkl2i0-ab2e08-51-178-81-232.traefik.me`)"
      - "traefik.http.routers.muslimbook.entrypoints=web"
      - "traefik.http.services.muslimbook.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
